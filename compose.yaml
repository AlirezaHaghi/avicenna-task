services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Requires dj-database-url (or django-environ) wired into settings.py
      DATABASE_URL: postgres://postgres:postgres@db:5432/notifications
      DJANGO_SECRET_KEY: dev-only-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy  # waits for pg_isready before starting

volumes:
  postgres_data: