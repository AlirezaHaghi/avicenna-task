services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-avicenna}
      POSTGRES_USER:     ${DB_USER:-avicenna}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-avicenna}
    volumes:
      - avicenna-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-avicenna} -d ${DB_NAME:-avicenna}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DB_HOST:     db
      DB_NAME:     ${DB_NAME:-avicenna}
      DB_USER:     ${DB_USER:-avicenna}
      DB_PASSWORD: ${DB_PASSWORD:-avicenna}
    depends_on:
      db:
        condition: service_healthy

volumes:
  avicenna-data: